# Cloudflare Workers configuration for CubaModel Bot
name = "cubamodel-worker"
main = "src/worker.js"
compatibility_date = "2024-08-20"
compatibility_flags = ["nodejs_compat"]

# Environment variables
[vars]
NODE_ENV = "production"
BOT_VERSION = "2.3.0"
ALLOWED_CHAT_IDS = "-1003049823623,-1003369990770"

# Secrets managed with `wrangler secret put ...`:
# - BOT_TOKEN (Telegram Bot Token)
# - TG_WEBHOOK_SECRET (Random string for webhook security)
# - ADMIN_TG_IDS (Comma-separated admin user IDs)

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "cubamodel"
database_id = "f8cf0093-1f67-465b-b9bd-1a46029f6e9c"

# KV namespace: captcha state + event logging
[[kv_namespaces]]
binding = "APP_KV"
id = "629cf5cf681b4f01898c7c8987156840"

# Cron: kick users with expired captcha
[triggers]
crons = ["*/5 * * * *"]

# Development configuration
[dev]
ip = "0.0.0.0"
port = 8787
local_protocol = "http"
